# laction.ini — local container run profiles
# Usage: laction [project-path] [profile]
#        laction .            → runs [default]
#        laction . test       → runs [test]

[default]
image = node:20
run = npm install && npm run build

[test]
image = node:20
run = npm install && npm test

[lint]
image = node:20
run = npm install && npm run lint

[dev]
image = node:20
run = npm run dev
